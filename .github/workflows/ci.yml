name: Flutter CI Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  analyze:
    name: Flutter Analyze
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.x'
          cache: true
          cache-key: flutter-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          cache-path: ${{ runner.tool_cache }}/flutter

      - name: Create platform directories
        run: flutter create --org com.voiceledger --project-name voiceledger .

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze lib/

  test:
    name: Flutter Tests
    runs-on: ubuntu-latest
    needs: analyze
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.x'
          cache: true
          cache-key: flutter-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          cache-path: ${{ runner.tool_cache }}/flutter

      - name: Create platform directories
        run: flutter create --org com.voiceledger --project-name voiceledger .

      - name: Get dependencies
        run: flutter pub get

      - name: Check if tests exist
        id: check_tests
        run: |
          if [ -d "test" ] && find test -name '*_test.dart' | grep -q .; then
            echo "has_tests=true" >> $GITHUB_OUTPUT
          else
            echo "has_tests=false" >> $GITHUB_OUTPUT
          fi

      - name: Run unit tests
        if: steps.check_tests.outputs.has_tests == 'true'
        run: flutter test --coverage

      - name: Upload coverage
        if: steps.check_tests.outputs.has_tests == 'true'
        uses: codecov/codecov-action@v3
        with:
          files: ./app/coverage/lcov.info
          flags: unittests
          name: codecov-umbrella

  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.x'
          cache: true
          cache-key: flutter-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          cache-path: ${{ runner.tool_cache }}/flutter

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Create platform directories
        run: flutter create --org com.voiceledger --project-name voiceledger .

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  build-ios:
    name: Build iOS
    runs-on: macos-latest
    needs: test
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.x'
          cache: true
          cache-key: flutter-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          cache-path: ${{ runner.tool_cache }}/flutter

      - name: Create platform directories
        run: flutter create --org com.voiceledger --project-name voiceledger .

      - name: Get dependencies
        run: flutter pub get

      - name: Build iOS
        run: flutter build ios --release --no-codesign

      - name: Upload iOS build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: app/build/ios/iphoneos/Runner.app
          retention-days: 30

  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.x'
          cache: true
          cache-key: flutter-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          cache-path: ${{ runner.tool_cache }}/flutter

      - name: Create platform directories
        run: flutter create --org com.voiceledger --project-name voiceledger .

      - name: Get dependencies
        run: flutter pub get

      - name: Run dart fix
        run: dart fix --dry-run

      - name: Check formatting
        run: dart format --set-exit-if-changed lib/

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.x'
          cache: true

      - name: Create platform directories
        run: flutter create --org com.voiceledger --project-name voiceledger .

      - name: Get dependencies
        run: flutter pub get

      - name: Run security audit
        run: flutter pub audit
        continue-on-error: true

      - name: Check for vulnerable deps
        run: |
          flutter pub audit --json > audit-report.json || true
          if grep -q '"vulnerabilityCount": [1-9]' audit-report.json; then
            echo "::warning::Vulnerabilities found in dependencies"
          fi
        continue-on-error: true
