name: Flutter CI Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

env:
  FLUTTER_VERSION: '3.24.5'

jobs:
  analyze:
    name: Flutter Analyze
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Generate platform directories
        run: |
          if [ ! -d "android" ] || [ ! -d "ios" ]; then
            cp pubspec.yaml pubspec.yaml.bak
            cp -r lib lib.bak
            cp -r test test.bak 2>/dev/null || true
            cp analysis_options.yaml analysis_options.yaml.bak 2>/dev/null || true
            flutter create --org com.voiceledger --project-name voiceledger --platforms android,ios .
            mv pubspec.yaml.bak pubspec.yaml
            rm -rf lib && mv lib.bak lib
            rm -rf test && mv test.bak test 2>/dev/null || true
            mv analysis_options.yaml.bak analysis_options.yaml 2>/dev/null || true
          fi

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos lib/

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Generate platform directories
        run: |
          if [ ! -d "android" ] || [ ! -d "ios" ]; then
            cp pubspec.yaml pubspec.yaml.bak
            cp -r lib lib.bak
            flutter create --org com.voiceledger --project-name voiceledger --platforms android,ios .
            mv pubspec.yaml.bak pubspec.yaml
            rm -rf lib && mv lib.bak lib
          fi

      - name: Get dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --set-exit-if-changed lib/

  test:
    name: Flutter Tests
    runs-on: ubuntu-latest
    needs: [analyze, lint]
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Generate platform directories
        run: |
          if [ ! -d "android" ] || [ ! -d "ios" ]; then
            cp pubspec.yaml pubspec.yaml.bak
            cp -r lib lib.bak
            cp -r test test.bak 2>/dev/null || true
            flutter create --org com.voiceledger --project-name voiceledger --platforms android,ios .
            mv pubspec.yaml.bak pubspec.yaml
            rm -rf lib && mv lib.bak lib
            rm -rf test && mv test.bak test 2>/dev/null || true
          fi

      - name: Get dependencies
        run: flutter pub get

      - name: Check for tests
        id: check_tests
        run: |
          if [ -d "test" ] && find test -name '*_test.dart' | head -1 | read; then
            echo "has_tests=true" >> $GITHUB_OUTPUT
          else
            echo "has_tests=false" >> $GITHUB_OUTPUT
          fi

      - name: Run tests
        if: steps.check_tests.outputs.has_tests == 'true'
        run: flutter test --coverage

  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Generate platform directories
        run: |
          if [ ! -d "android" ]; then
            cp pubspec.yaml pubspec.yaml.bak
            cp -r lib lib.bak
            cp -r test test.bak 2>/dev/null || true
            cp analysis_options.yaml analysis_options.yaml.bak 2>/dev/null || true
            flutter create --org com.voiceledger --project-name voiceledger --platforms android .
            mv pubspec.yaml.bak pubspec.yaml
            rm -rf lib && mv lib.bak lib
            rm -rf test && mv test.bak test 2>/dev/null || true
            mv analysis_options.yaml.bak analysis_options.yaml 2>/dev/null || true
          fi

      - name: Fix Android compileSdk
        run: |
          # 確保 compileSdk 版本足夠高
          if [ -f "android/app/build.gradle" ]; then
            sed -i 's/compileSdk = flutter.compileSdkVersion/compileSdk = 35/' android/app/build.gradle
            sed -i 's/compileSdkVersion flutter.compileSdkVersion/compileSdkVersion 35/' android/app/build.gradle
            sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 21/' android/app/build.gradle
            sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/' android/app/build.gradle
            sed -i 's/targetSdk = flutter.targetSdkVersion/targetSdk = 35/' android/app/build.gradle
            sed -i 's/targetSdkVersion flutter.targetSdkVersion/targetSdkVersion 35/' android/app/build.gradle
          fi
          if [ -f "android/app/build.gradle.kts" ]; then
            sed -i 's/compileSdk = flutter.compileSdkVersion/compileSdk = 35/' android/app/build.gradle.kts
            sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 21/' android/app/build.gradle.kts
            sed -i 's/targetSdk = flutter.targetSdkVersion/targetSdk = 35/' android/app/build.gradle.kts
          fi

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  build-ios:
    name: Build iOS
    runs-on: macos-latest
    needs: test
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Generate platform directories
        run: |
          if [ ! -d "ios" ]; then
            cp pubspec.yaml pubspec.yaml.bak
            cp -r lib lib.bak
            cp -r test test.bak 2>/dev/null || true
            cp analysis_options.yaml analysis_options.yaml.bak 2>/dev/null || true
            flutter create --org com.voiceledger --project-name voiceledger --platforms ios .
            mv pubspec.yaml.bak pubspec.yaml
            rm -rf lib && mv lib.bak lib
            rm -rf test && mv test.bak test 2>/dev/null || true
            mv analysis_options.yaml.bak analysis_options.yaml 2>/dev/null || true
          fi

      - name: Get dependencies
        run: flutter pub get

      - name: Build iOS
        run: flutter build ios --release --no-codesign

      - name: Upload iOS build
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: app/build/ios/iphoneos/Runner.app
          retention-days: 30

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Generate platform directories
        run: |
          if [ ! -d "android" ]; then
            cp pubspec.yaml pubspec.yaml.bak
            cp -r lib lib.bak
            flutter create --org com.voiceledger --project-name voiceledger --platforms android .
            mv pubspec.yaml.bak pubspec.yaml
            rm -rf lib && mv lib.bak lib
          fi

      - name: Get dependencies
        run: flutter pub get

      - name: Security audit
        run: flutter pub audit
        continue-on-error: true
