name: Android CD Pipeline

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-sign:
    name: Build, Sign & Release Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.x'
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Get dependencies
        run: flutter pub get

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Update pubspec.yaml version
        run: |
          sed -i "s/version: .*/version: ${{ steps.version.outputs.VERSION }}/" pubspec.yaml

      - name: Build APK (release)
        run: flutter build apk --release --split-per-abi

      - name: Build AAB (release)
        run: flutter build appbundle --release

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/upload-keystore.jks

      - name: Sign APK
        run: |
          mkdir -p signed-apk
          for apk in build/app/outputs/flutter-apk/app-*-release.apk; do
            apkname=$(basename "$apk")
            jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
              -keystore android/app/upload-keystore.jks \
              -storepass "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
              -keypass "${{ secrets.ANDROID_KEY_PASSWORD }}" \
              "$apk" "${{ secrets.ANDROID_KEY_ALIAS }}"
            cp "$apk" "signed-apk/$apkname"
          done

      - name: Sign AAB
        run: |
          mkdir -p signed-aab
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore android/app/upload-keystore.jks \
            -storepass "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.ANDROID_KEY_PASSWORD }}" \
            build/app/outputs/bundle/release/app-release.aab "${{ secrets.ANDROID_KEY_ALIAS }}"
          cp build/app/outputs/bundle/release/app-release.aab signed-aab/app-release.aab

      - name: Clean keystore
        if: always()
        run: rm -f android/app/upload-keystore.jks

      - name: Determine release channel
        id: channel
        run: |
          if [[ "${{ github.ref }}" == *"-beta"* ]] || [[ "${{ github.ref }}" == *"-rc"* ]]; then
            echo "CHANNEL=beta" >> $GITHUB_OUTPUT
          else
            echo "CHANNEL=release" >> $GITHUB_OUTPUT
          fi

      - name: Upload to Firebase App Distribution (Beta)
        if: steps.channel.outputs.CHANNEL == 'beta'
        run: |
          curl -H "Authorization: Bearer ${{ secrets.FIREBASE_TOKEN }}" \
            -F "file=@signed-apk/$(ls signed-apk | head -1)" \
            -F "releaseNotes=${{ github.event.head_commit.message }}" \
            -F "testers=firebase-testers" \
            "https://firebaseappdistribution.googleapis.com/v1/projects/${{ secrets.FIREBASE_PROJECT_ID }}/apps/${{ secrets.FIREBASE_ANDROID_APP_ID }}/releases"

      - name: Upload to Google Play (Release)
        if: steps.channel.outputs.CHANNEL == 'release'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.voiceledger.app
          releaseFiles: 'signed-aab/app-release.aab'
          track: production
          whatsNewDirectory: whatsnew
          status: completed
          mappingFile: build/app/outputs/mapping/release/mapping.txt

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v3
        with:
          name: android-apk-release-${{ steps.version.outputs.VERSION }}
          path: signed-apk/
          retention-days: 90

      - name: Upload AAB artifacts
        uses: actions/upload-artifact@v3
        with:
          name: android-aab-release-${{ steps.version.outputs.VERSION }}
          path: signed-aab/
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            signed-apk/app-*-release.apk
            signed-aab/app-release.aab
          body: |
            Release v${{ steps.version.outputs.VERSION }}

            Built on Flutter 3.19.x

            Changes: ${{ github.event.head_commit.message }}
          draft: false
          prerelease: ${{ steps.channel.outputs.CHANNEL == 'beta' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    name: Notify Release
    runs-on: ubuntu-latest
    needs: build-and-sign
    if: always()
    steps:
      - name: Send Telegram notification
        run: |
          STATUS="${{ needs.build-and-sign.result }}"
          VERSION="${GITHUB_REF#refs/tags/v}"

          if [ "$STATUS" = "success" ]; then
            MESSAGE="✅ Android Release v$VERSION 發佈成功！"
          else
            MESSAGE="❌ Android Release v$VERSION 發佈失敗"
          fi

          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=$MESSAGE"
