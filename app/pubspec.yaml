name: voiceledger
description: AI Financial Secretary App - 語記
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management & Navigation
  flutter_riverpod: ^2.4.0
  riverpod: ^2.4.0
  go_router: ^14.0.0

  # Backend & Auth
  supabase_flutter: ^2.3.0

  # Networking
  http: ^1.1.0

  # Voice & Audio
  speech_to_text: ^7.0.0

  # Location
  geolocator: ^12.0.0
  geocoding: ^3.0.0

  # Permissions
  permission_handler: ^11.4.0

  # Local Storage
  shared_preferences: ^2.2.0

  # UI & Design
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.0
  fl_chart: ^0.69.0
  table_calendar: ^3.1.0

  # AI
  google_generative_ai: ^0.4.0

  # AI
  google_generative_ai: ^0.4.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.0.0
  logger: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/pet/
    - assets/animations/
    - assets/icons/
    - assets/fonts/
