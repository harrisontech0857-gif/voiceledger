name: voiceledger
description: AI Financial Secretary App - 語記
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management & Navigation
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0
  go_router: ^14.0.0

  # Backend & Auth
  supabase_flutter: ^1.10.0
  supabase: ^1.10.0

  # API & Networking
  http: ^1.1.0
  dio: ^5.3.0

  # Voice & Audio
  speech_to_text: ^7.0.0
  audio_session: ^0.1.13
  record: ^5.1.0

  # Location & Geofencing
  geolocator: ^10.1.0
  # geofencing 套件不存在，改用 easy_geofencing 或 native_geofence
  # TODO: 前端開發時選擇合適的 geofencing 套件

  # Image & Camera
  image_picker: ^1.0.0
  permission_handler: ^11.4.0

  # Local Storage
  hive: ^2.2.0
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.0

  # Monetization & Subscriptions
  purchases_flutter: ^7.0.0

  # UI & Design
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.0
  lottie: ^3.1.0
  animations: ^2.0.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.0.0
  json_annotation: ^4.8.0
  logger: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  riverpod_generator: ^2.3.0
  build_runner: ^2.4.0
  hive_generator: ^2.0.0
  json_serializable: ^6.7.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
    - assets/fonts/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
